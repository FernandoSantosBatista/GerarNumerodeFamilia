<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Código</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>Gerar Número de Família</h2>

  <input type="text" id="area" placeholder="Número da Área" maxlength="4">
  <input type="text" id="casa" placeholder="Número da Casa" maxlength="6">

  <button onclick="gerarCodigo()">Gerar Código</button>

  <div id="resultado"></div>
  <div id="mensagem" class="mensagem"></div>
</div>

<script src="script.js"></script>

</body>
</html>
